<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing Game</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    padding: 1rem;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 1.25rem;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .attempts-badge {
    text-align: center;
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 1rem;
  }
  .attempts-badge span { color: #facc15; font-weight: 600; }
  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .input-group input {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid #334155;
    border-radius: 0.75rem;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: #3b82f6; }
  .input-group input:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn {
    padding: 0.75rem 1.25rem;
    border: none;
    border-radius: 0.75rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #2563eb; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #16a34a; }
  .btn-outline {
    background: transparent;
    color: #94a3b8;
    border: 1px solid #334155;
    width: 100%;
  }
  .btn-outline:hover { background: #334155; color: #e2e8f0; }
  .feedback {
    padding: 1rem;
    border-radius: 0.75rem;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    min-height: 3.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .feedback.hidden { visibility: hidden; }
  .feedback.hot { background: #7c1d1d; color: #fca5a5; }
  .feedback.close { background: #1e3a5f; color: #93c5fd; }
  .feedback.warm { background: #3f2e1e; color: #fcd34d; }
  .feedback.cool { background: #1e293b; color: #94a3b8; }
  .feedback.cold { background: #0f172a; color: #64748b; }
  .feedback.freezing { background: #0a0f1a; color: #475569; }
  .feedback.correct { background: #14532d; color: #4ade80; }
  .history { margin-top: 1.5rem; }
  .history h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
    margin-bottom: 0.5rem;
  }
  .history-list {
    list-style: none;
    max-height: 180px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 0.4rem 0.75rem;
    border-radius: 0.5rem;
    font-size: 0.85rem;
    background: #0f172a;
  }
  .history-item .num { font-weight: 600; color: #e2e8f0; }
  .history-item .hint { color: #94a3b8; font-size: 0.8rem; }
  .history-item .result-correct { color: #4ade80; }
  .history-item .hint-hot { color: #fca5a5; }
  .history-item .hint-warm { color: #fcd34d; }
  .alert {
    background: #3f1e1e;
    color: #f87171;
    padding: 0.75rem;
    border-radius: 0.75rem;
    text-align: center;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🎯 Number Guess</h1>
  <p class="subtitle">Guess a number between 1 and 100</p>

  <div id="alert" class="alert hidden"></div>
  <div id="feedback" class="feedback hidden"></div>

  <div class="attempts-badge">Attempts: <span id="attempts">0</span></div>

  <div class="input-group">
    <input type="number" id="guessInput" min="1" max="100" placeholder="Enter guess..." disabled>
    <button class="btn btn-primary" id="guessBtn" disabled>Guess</button>
  </div>

  <button class="btn btn-success" id="newGameBtn">New Game</button>

  <div class="history">
    <h3>Guess History</h3>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<script>
const API = window.location.origin;
let gameId = null;

const guessInput = document.getElementById('guessInput');
const guessBtn = document.getElementById('guessBtn');
const newGameBtn = document.getElementById('newGameBtn');
const feedback = document.getElementById('feedback');
const attempts = document.getElementById('attempts');
const historyList = document.getElementById('historyList');
const alert = document.getElementById('alert');

function showAlert(msg) {
  alert.textContent = msg;
  alert.classList.remove('hidden');
  setTimeout(() => alert.classList.add('hidden'), 3000);
}

function setFeedback(text, type) {
  feedback.textContent = text;
  feedback.className = 'feedback ' + (type || '');
  if (type) feedback.classList.remove('hidden');
  else feedback.classList.add('hidden');
}

function hintClass(hint) {
  return hint === 'Burning hot!' ? 'hint-hot'
    : hint === 'Very close' || hint === 'Close' ? ''
    : hint === 'Warm' ? 'hint-warm'
    : '';
}

function addHistory(num, result, correct) {
  const li = document.createElement('li');
  li.className = 'history-item';
  if (correct) {
    li.innerHTML = `<span class="num">${num}</span><span class="result-correct">Correct!</span>`;
  } else {
    const cls = hintClass(result);
    li.innerHTML = `<span class="num">${num}</span><span class="hint ${cls}">${result}</span>`;
  }
  historyList.appendChild(li);
  historyList.scrollTop = historyList.scrollHeight;
}

function enableGame() {
  guessInput.disabled = false;
  guessBtn.disabled = false;
  guessInput.focus();
}

function disableGame() {
  guessInput.disabled = true;
  guessBtn.disabled = true;
}

async function newGame() {
  try {
    const res = await fetch(`${API}/new-game`, { method: 'POST' });
    if (!res.ok) throw new Error('Failed to start game');
    const data = await res.json();
    gameId = data.game_id;
    setFeedback('', '');
    attempts.textContent = '0';
    historyList.innerHTML = '';
    guessInput.value = '';
    enableGame();
    guessInput.focus();
    showAlert('New game started!');
  } catch (e) {
    showAlert('Error: ' + e.message);
  }
}

async function makeGuess() {
  const val = parseInt(guessInput.value, 10);
  if (isNaN(val) || val < 1 || val > 100) {
    showAlert('Enter a number between 1 and 100');
    return;
  }
  guessBtn.disabled = true;
  try {
    const res = await fetch(`${API}/guess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game_id: gameId, number: val }),
    });
    const data = await res.json();
    if (!res.ok) {
      showAlert(data.detail || 'Error');
      disableGame();
      return;
    }
    attempts.textContent = data.attempts;

    let feedbackText, feedbackType;
    if (data.result === 'correct') {
      feedbackText = `Correct! The number was ${data.secret}. You got it in ${data.attempts} ${data.attempts === 1 ? 'try' : 'tries'}!`;
      feedbackType = 'correct';
      disableGame();
    } else {
      feedbackText = data.hint;
      feedbackType = data.hint === 'Burning hot!' ? 'hot'
        : data.hint === 'Very close' || data.hint === 'Close' ? 'close'
        : data.hint === 'Warm' ? 'warm'
        : data.hint === 'Cool' ? 'cool'
        : data.hint === 'Cold' ? 'cold'
        : 'freezing';
      guessInput.value = '';
      guessInput.focus();
    }
    setFeedback(feedbackText, feedbackType);
    addHistory(val, data.hint || data.result, data.result === 'correct');
  } catch (e) {
    showAlert('Error: ' + e.message);
  } finally {
    guessBtn.disabled = !gameId || guessInput.disabled;
  }
}

newGameBtn.addEventListener('click', newGame);
guessBtn.addEventListener('click', makeGuess);
guessInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !guessBtn.disabled) makeGuess(); });
</script>
</body>
</html>
