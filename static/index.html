<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <h1>Number Guess</h1>
  <p class="subtitle">Guess a number between 1 and 100</p>

  <div id="alert" class="alert hidden"></div>
  <div id="feedback" class="feedback hidden"></div>

  <div class="attempts-badge">Attempts: <span id="attempts">0</span></div>

  <div class="input-group">
    <input type="number" id="guessInput" min="1" max="100" placeholder="Enter guess..." disabled>
    <button class="btn btn-primary" id="guessBtn" disabled>Guess</button>
  </div>

  <button class="btn btn-success" id="newGameBtn">New Game</button>

  <div class="history">
    <h3>Guess History</h3>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
